<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PedeAí - Order Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between z-10 absolute top-0 left-0 right-0 bg-gradient-to-b from-background-light/80 to-transparent dark:from-background-dark/80 backdrop-blur-sm">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full bg-white/50 dark:bg-black/50 backdrop-blur-md shadow-sm">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 text-slate-900 dark:text-white drop-shadow-md">Order Tracking</h2>
</div>
<!-- Map Area -->
<div class="w-full h-[45vh] bg-center bg-no-repeat bg-cover object-cover relative" data-alt="Map showing delivery route" data-location="São Paulo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuALQ6TnQtipM4vdopZzJvsNku-U_XhwPJWeoVBk8PO5airVClFnH7vayXmmkeNOTSR6dw0rnSCC3lWrlprIw9m8xz-MCV6ETa_5pVMYPX8AedgxswbFX89sYGmxRutxaapl-zsZg-_X8MPABXQYJX8mNAC86O8G6ikJu95jS0MEOq_SkgeO2yxlQr6faJauJ3hLiGHhG-QXoY2mxKAJ3CcghCl8vPsdTBdUxEIPAlRVXXB7UJKyAGrqvSxqQZjJ442teQTXHG11dZU");'>
<!-- Delivery Driver Pin -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-primary text-white rounded-full p-2 shadow-lg animate-pulse">
<span class="material-symbols-outlined">two_wheeler</span>
</div>
<!-- Restaurant Pin -->
<div class="absolute top-1/4 left-1/3 transform -translate-x-1/2 -translate-y-1/2 bg-white text-primary rounded-full p-2 shadow-lg">
<span class="material-symbols-outlined">storefront</span>
</div>
<!-- Destination Pin -->
<div class="absolute bottom-1/4 right-1/3 transform translate-x-1/2 translate-y-1/2 bg-slate-900 text-white rounded-full p-2 shadow-lg">
<span class="material-symbols-outlined">home</span>
</div>
<!-- Route Line (Decorative) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="opacity-70" d="M33,25 Q50,35 50,50 T66,75" fill="none" stroke="var(--color-primary, #f27f0d)" stroke-dasharray="4 4" stroke-width="2"></path>
</svg>
</div>
<!-- Status Content -->
<div class="flex-1 bg-background-light dark:bg-background-dark rounded-t-xl -mt-6 z-20 relative p-4 flex flex-col gap-6">
<!-- Drag Indicator -->
<div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-2"></div>
<!-- Estimated Delivery & Action -->
<div class="flex items-stretch justify-between gap-4 rounded-xl bg-white dark:bg-slate-800/50 p-5 shadow-sm border border-slate-100 dark:border-slate-700/50">
<div class="flex flex-col gap-2 flex-1">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-tight">Estimated Delivery</p>
<p class="text-3xl font-bold leading-none text-slate-900 dark:text-white">15-20 <span class="text-lg font-medium text-slate-500">min</span></p>
</div>
<div class="flex items-center">
<button class="flex items-center justify-center rounded-full h-10 px-4 bg-primary/10 text-primary dark:bg-primary/20 hover:bg-primary/20 transition-colors gap-2 text-sm font-semibold">
<span class="material-symbols-outlined text-[18px]">support_agent</span>
<span>Support</span>
</button>
</div>
</div>
<!-- Order Status Timeline -->
<div class="px-2 pb-8">
<h3 class="font-bold text-lg mb-6">Status</h3>
<div class="grid grid-cols-[40px_1fr] gap-x-4">
<!-- Step 1: Preparing (Completed) -->
<div class="flex flex-col items-center gap-1">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white shadow-sm z-10">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<div class="w-0.5 bg-primary h-12 grow rounded-full"></div>
</div>
<div class="flex flex-col pb-8 pt-1">
<p class="text-base font-bold text-slate-900 dark:text-white">Preparing your order</p>
<p class="text-sm text-slate-500 dark:text-slate-400">The restaurant is packing your food.</p>
<p class="text-xs text-slate-400 mt-1">12:35 PM</p>
</div>
<!-- Step 2: Out for Delivery (Active) -->
<div class="flex flex-col items-center gap-1">
<div class="w-0.5 bg-primary h-2 rounded-full"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full border-2 border-primary bg-white dark:bg-slate-800 text-primary z-10 shadow-[0_0_0_4px_rgba(242,127,13,0.15)]">
<span class="material-symbols-outlined text-[18px]">local_shipping</span>
</div>
<div class="w-0.5 bg-slate-200 dark:bg-slate-700 h-12 grow rounded-full border-l-2 border-dashed border-slate-300 dark:border-slate-600 bg-transparent"></div>
</div>
<div class="flex flex-col pb-8 pt-1">
<p class="text-base font-bold text-slate-900 dark:text-white">Out for delivery</p>
<p class="text-sm text-primary font-medium">Driver is on the way!</p>
</div>
<!-- Step 3: Delivered (Pending) -->
<div class="flex flex-col items-center gap-1 pb-2">
<div class="w-0.5 bg-slate-200 dark:bg-slate-700 h-2 rounded-full border-l-2 border-dashed border-slate-300 dark:border-slate-600 bg-transparent"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 z-10">
<span class="material-symbols-outlined text-[18px]">home</span>
</div>
</div>
<div class="flex flex-col pt-1">
<p class="text-base font-medium text-slate-400 dark:text-slate-500">Delivered</p>
</div>
</div>
</div>
</div>
</div>
</body></html>
